<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación Genética</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <h1>Programación Genética</h1>
            <p>Descubre ecuaciones ocultas en los datos usando algoritmos evolutivos</p>
        </header>

        <section class="controls">
            <div class="input-group">
                <label for="dataset">Dataset</label>
                <select id="dataset">
                    <option value="yacht">Yacht Hydrodynamics</option>
                    <option value="concrete">Concrete Compressive Strength</option>
                    <option value="housing">Housing Data</option>
                    <option value="energy_cooling">Energy Cooling</option>
                    <option value="energy_heating">Energy Heating</option>
                </select>
            </div>
            <div class="input-group">
                <label for="generations">Generaciones</label>
                <input type="number" id="generations" value="20" min="1" max="100">
            </div>
            <div class="input-group">
                <label for="population">Población</label>
                <input type="number" id="population" value="200" min="10" max="1000">
            </div>
            <button id="run-btn" class="primary-btn">Ejecutar Experimento</button>
        </section>

        <section id="results" class="results-container hidden">
            <div class="loader hidden" id="loader">
                <div class="spinner"></div>
                <p>Evolucionando población...</p>
            </div>

            <div id="data-results" class="hidden fade-in">
                <h2>Resultados del Mejor Individuo</h2>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h3>RMSE (Test)</h3>
                        <p id="res-rmse">0.00</p>
                    </div>
                    <div class="metric-card">
                        <h3>R² (Test)</h3>
                        <p id="res-r2">0.00</p>
                    </div>
                    <div class="metric-card">
                        <h3>Profundidad</h3>
                        <p id="res-depth">0</p>
                    </div>
                    <div class="metric-card">
                        <h3>Tamaño (Nodos)</h3>
                        <p id="res-size">0</p>
                    </div>
                </div>
                <div class="expression-card">
                    <h3>Mejor Expresión Matemática Encontrada</h3>
                    <code id="res-expression">...</code>
                </div>
                <div class="tree-card">
                    <h3>Árbol de Expresión</h3>
                    <div id="tree-container"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
